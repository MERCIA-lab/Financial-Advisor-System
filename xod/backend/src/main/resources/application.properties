spring.application.name=xod-backend
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/xod}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:xod}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:xod}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.flyway.enabled=true
server.port=8080

app.jwt.secret=${APP_JWT_SECRET:change-me-to-a-long-random-secret-key-at-least-32-bytes}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:28800000}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
