# Production-like Docker Compose for testing
# This mimics the production deployment setup

version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: xod
      POSTGRES_USER: xod
      POSTGRES_PASSWORD: xod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xod -d xod"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/xod
      SPRING_DATASOURCE_USERNAME: xod
      SPRING_DATASOURCE_PASSWORD: xod
      APP_JWT_SECRET: 1234567890123456789012345678901234567890123456789012345678901234
      APP_JWT_EXPIRATION_MS: 28800000
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    depends_on:
      - backend

volumes:
  postgres_data: