services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: xod
      POSTGRES_USER: xod
      POSTGRES_PASSWORD: xod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xod -d xod"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/xod
      SPRING_DATASOURCE_USERNAME: xod
      SPRING_DATASOURCE_PASSWORD: xod
      APP_JWT_SECRET: 1234567890123456789012345678901234567890123456789012345678901234
      APP_JWT_EXPIRATION_MS: 28800000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
